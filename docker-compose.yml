services:
  postgres:
    image: postgres:16
    container_name: food_cluster_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodcluster
      POSTGRES_PASSWORD: foodcluster
      POSTGRES_DB: foodcluster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodcluster -d foodcluster"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: food_cluster_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
